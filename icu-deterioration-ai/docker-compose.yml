version: "3.9"

services:

  # --- PostgreSQL (MIMIC-III database) ---
  db:
    image: postgres:15
    container_name: icu_postgres
    environment:
      POSTGRES_DB: mimic
      POSTGRES_USER: ${DB_USER:-mimic_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mimic_user -d mimic"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: icu_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-mimic_user}:${DB_PASSWORD:-changeme}@db:5432/mimic
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # --- React Dashboard ---
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: icu_dashboard
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    volumes:
      - ./dashboard/src:/app/src
    depends_on:
      - api

  # --- MLflow Experiment Tracking ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: icu_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow

volumes:
  postgres_data:
  mlflow_data:
